name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: uv sync

      - name: Install Tesseract (for tessdata files)
        run: choco install tesseract --yes

      - name: Convert icon PNG to ICO
        shell: pwsh
        run: uv run python -c "from PIL import Image; img = Image.open('assets/app-icon.png').convert('RGBA'); img.save('assets/app-icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(256,256)])"

      - name: Build EXE
        shell: pwsh
        run: |
          $tess = "C:\Program Files\Tesseract-OCR"
          uv run pyinstaller --onefile --windowed `
            --add-data "$tess\tessdata\eng.traineddata;tessdata" `
            --add-data "assets\app-icon.png;assets" `
            --add-data "assets\app-icon.ico;assets" `
            --collect-all customtkinter `
            --collect-all tkinterdnd2 `
            --icon "assets\app-icon.ico" `
            --name tng_toll_summary `
            gui.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: tng_toll_summary-windows
          path: dist\tng_toll_summary.exe
          retention-days: 30
